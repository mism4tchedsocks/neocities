    <style>
        .box3 p {
            margin-top:20px;
        }
    .row { 
        display:flex;
        flex-direction: row;
        gap:20px;
        padding:15px;
        max-height:30vw;
        overflow-y:hidden;
        overflow-x:scroll;
        margin-bottom:2vw;
    }
    .row img { max-width:100%;}
    .box2 {
        position: fixed;
        width:20vw;
        top:20%;
    }
    .box2 a {margin-bottom:0;}
    .box3 {
        display:grid;
        grid-template-areas:"content1 content2";
        grid-template-columns: 1fr 1fr;
        gap:30px;
        padding:0;
    }
    .comic { 
        border: 2px solid var(--body-color); 
        padding:15px;
        word-break: keep-all;
        margin-bottom:2vw;
    }
    .comic img {
        display:inline-block;
        width: 100%;
    }
    .comic h3 {
        margin:0;
        padding-bottom:5px;
        margin-bottom:10px;
        border-bottom:2px dotted var(--body-color);
    }
    .date {
        font-size:0.7rem;
        margin-top:10px;
        padding-top:10px;
        border-top:2px dotted var(--body-color);
    }    
    .top {display:none;}

@media only screen and (max-width: 900px) {
    .row { 
        display:flex;
        flex-direction: row;
        gap:20px;
        border: 1px solid var(--accent-color); 
        padding:5px;
        max-height:60vw;
        overflow-y:hidden;
        overflow-x:scroll;
        margin-bottom:5vw;
    }
    .box2 {
        position: static;
        width:100%;
    }
    .box3 {
        display:flex;
        flex-direction: column;
        flex-wrap: nowrap;
        padding:0;
    }
    .row img, .comic img { width:100%;}
    .comic { 
        border: 2px solid var(--body-color); 
        padding:15px;
        word-break: keep-all;
    }
    .comic h3 {
        margin:0;
        padding-bottom:5px;
        margin-bottom:10px;
        border-bottom:2px dotted var(--body-color);
    }
    .date {
        font-size:0.7rem;
        margin-top:10px;
        padding-top:10px;
        border-top:2px dotted var(--body-color);
    }
    .top {
        display:inline;
        position:sticky;
        top:10px;
        background-color: var(--accent-color);
        color:var(--body-bg-color);
        border-radius:5px;
        text-transform:uppercase;
        padding:10px;
        width:fit-content;
    }
button {
    border:1px solid var(--accent-color);
    color:var(--accent-color);
    background-color: var(--body-bg-color);
    padding:15px;
    border-radius: 5px;
    text-transform: uppercase;
}
button:hover {
    border:1px solid var(--accent-color);
    color:var(--body-bg-color);
    background-color: var(--accent-color);
}
}
    </style>
