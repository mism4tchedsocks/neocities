<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" media="screen" href="/css/index.css">
    <title>bathroom art</title>
    <style> 
        .box6 {
        display:grid;
        grid-template-areas:"content1 content2 content3";
        grid-template-columns: 1fr 1fr 1fr;
        gap:15px;
        }
        .box6 > div.content1 {
        grid-area: content1;
        }
        .box6 > div.content2 {
        grid-area: content2; 
        }
        .box6 > div.content3 {
        grid-area: content3; 
        }
        .content1, .content2, .content3 { 
            width:30%;
            display:flex;
            flex-direction: column;
        }
        figure {
            display:inline-block;
            margin:0;
            padding: 15px;
        }
        figcaption {
            width:20vw;
            word-wrap:break-word;
        }
        figure img {
            width:20vw;
        }
        p {
            margin-top:0; 
            text-align: center;
        }
@media only screen and (max-width: 900px) {
    .box6 {
        display:flex;
        flex-direction: column;
        flex-wrap: wrap;
    }
        .content1, .content2, .content3 { 
            width:100%;
            display:flex;
            flex-direction: column;
        }
        figure {
            display:inline-block;
            margin:0;
            padding: 15px;
        }
        figcaption {
            width:100%;
            word-wrap:break-word;
        }
        figure img {
            width:100%;
        }
}
    </style>
</head>
<body>
    <div id="container"><div id="grid">
        <div class="box1">
            <h1>bathroom art</h1>
            <a href="/">home</a> / <a href="/shrines/index.html">collections</a>
            <p class="headernotes">collections of notes left the bathrooms at my campus</p>
        </div>
        <div class="box6">
            <div class="content1">
                <figure>
                    <img src="/shrines/bathroomart/ikkakdusikben.jpeg" alt="Translated from dutch: 'I shit therefore I am' in thin black writing.">
                    <figcaption>ik kak dus ik ben / i shit therefore i am</figcaption>
                </figure>
                <figure>
                    <img src="/shrines/bathroomart/sitdown.jpeg" alt="'Sit down' &  'be humble' written on the wall, 'This way to the ministry of magic' written on the flush button.">
                    <figcaption>sit down, be humble & this way to the ministry of magic</figcaption>
                </figure>
            </div>
            <div class="content2">
                <figure>
                    <img src="/shrines/bathroomart/wrmzoconplex.JPG" alt="Translated: 'Why so conplex', along with drawings of a tree, a hot air balloon, a moon and a dragon.">
                    <figcaption>wrm zo conplex / why so conplex</figcaption>
                </figure>
                <figure>
                    <img src="/shrines/bathroomart/rosapascal.jpeg" alt="Thin line drawing of a face with writing next to it.">
                    <figcaption>ik ben rosa pascal en ik hou van mijn plooifiets / i am rosa pascal and i love my folding bicycle</figcaption>
                </figure>
            </div>
            <div class="content3">
                <figure>
                    <img src="/shrines/bathroomart/ontspanenkakhard.jpeg" alt="Writing in red and black marker and pencil.">
                    <figcaption>ontspan en kak hard / relax and shit hard + old school wiping</figcaption>
                </figure>
            </div>
        </div>
    </div>
    </div></div>
</body>
</html>
