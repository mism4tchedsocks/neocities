    <link rel="stylesheet" type="text/css" media="screen" href="/css/index.css">
    <title>pin collection</title>
    <style> 
        .box6 {
        display:grid;
        grid-template-areas:"content1 content2 content3";
        grid-template-columns: 1fr 1fr 1fr;
        gap:15px;
        }
        .box6 > div.content1 {
        grid-area: content1;
        }
        .box6 > div.content2 {
        grid-area: content2; 
        }
        .box6 > div.content3 {
        grid-area: content3; 
        }
        .content1, .content2, .content3 { 
            width:30%;
            display:flex;
            flex-direction: column;
        }
        figure {
            display:inline-block;
            margin:0;
            padding: 15px;
        }
        figcaption {
            width:20vw;
            word-wrap:break-word;
        }
        figure img {
            width:10vw;
        }
        p {
            margin-top:0; 
            text-align: center;
        }
@media only screen and (max-width: 650px) {
    .box6 {
        display:flex;
        flex-direction: column;
        flex-wrap: wrap;
        gap:10px;
        word-break: normal;
    }
        figure {
            display:block;
            margin:0;
        }
        figcaption {
            width:100%;
            word-wrap:break-word;
        }
        figure img {
            width:100%;
        }
}
    </style>
</head>
