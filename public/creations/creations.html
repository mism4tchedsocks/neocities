  <script src="https://cdn.jsdelivr.net/npm/bigger-picture@1.1.19/dist/bigger-picture.min.js"></script>
  <script defer>
    // initialize
    let bp = BiggerPicture({
      target: document.body,
    });

    // grab image links
    let imageLinks = document.querySelectorAll("#gallery li > figure > a");

    // add listener to open BiggerPicture
    let openGallery = function (e) {
      e.preventDefault();
      bp.open({
        items: imageLinks,
        el: e.currentTarget,
        intro: "fadeup",
        inline: false,
      });
    };
    for (let link of imageLinks) {
      link.addEventListener("click", openGallery);
    }
  </script>

  <script src="https://unpkg.com/isotope-layout@3/dist/isotope.pkgd.min.js"></script>
  <script defer>
    // initialize
    var iso = new Isotope(".grid", {
      itemSelector: ".grid-item",
      percentPosition: true,
      layoutMode: "masonry",
      masonry: {
        columnWidth: ".grid-sizer",
        gutter: ".gutter-sizer",
      },
    });

    // flatten object by concatting values
    function concatValues(obj) {
      var value = "";
      for (var prop in obj) {
        value += obj[prop];
      }
      return value;
    }

    // store filter for each group
    var filters = {};
    var filtersElem = document.querySelector(".filters");
    filtersElem.addEventListener("click", function (event) {
      var isButton = event.target.classList.contains("button");
      if (!isButton) return;

      var buttonGroup = fizzyUIUtils.getParent(event.target, ".button-group");
      var filterGroup = buttonGroup.getAttribute("data-filter-group");
      // set filter for group
      filters[filterGroup] = event.target.getAttribute("data-filter");
      // combine filters
      var filterValue = concatValues(filters);
      // set filter for Isotope
      iso.arrange({ filter: filterValue });
    });

    // change is-checked class on buttons
    var buttonGroups = document.querySelectorAll(".button-group");
    for (var i = 0; i < buttonGroups.length; i++) {
      var buttonGroup = buttonGroups[i];
      var onButtonGroupClick = getOnButtonGroupClick(buttonGroup);
      buttonGroup.addEventListener("click", onButtonGroupClick);
    }

    function getOnButtonGroupClick(buttonGroup) {
      return function (event) {
        // check for only button clicks
        var isButton = event.target.classList.contains("button");
        if (!isButton) return;
        buttonGroup.querySelector(".is-checked").classList.remove("is-checked");
        event.target.classList.add("is-checked");

        // the bullshit i added to make this compatible with biggerpicture lightbox.
        // this is super fucking jank and if i was a good programmer i would be
        // properly handling the the race conditions rather than using a timer but
        // i cant be bothered to look through isotope's code. sorry!

        // this removes filtered images from the lightbox gallery
        setTimeout(function () {
          imageLinks = document.querySelectorAll(
            '#gallery li:not([style*="display: none"]) > figure > a'
          );
        }, 550);
      };
    }
  </script>
