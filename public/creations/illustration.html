    <style> 
        h1 {
            text-align: center;

        }

        main {
            flex: none;
            padding: 20px;
            order: 2;
            margin:auto;
            width:60% !important;
            height: auto;
        }
        .gallery {
	padding: 5px;
	overflow-y:scroll;
	overflow-x:hidden;
    display: grid;
    grid-template-areas:"year year" "content1 content2";
    gap:15px;
    grid-template-columns: 1fr 1fr;
}
.container > div.year {
  grid-area: year;
  text-align: center;
}
.container > div.content1 {
  grid-area: content1;
}
.container > div.content2 {
  grid-area: content2;
}
        @media only screen and (max-width: 1100px) {
             #flex {
                 flex-wrap: wrap;
            }
            #leftSidebar {
                order: 1;
                position:relative;
            }
             main {
                 order: 2;
                 margin:auto;
                 position:absolute;
            }
        }
  </style>
</head>
